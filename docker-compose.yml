services:
  app:
    build: .
    container_name: upload-page
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # HTTPS router
      - "traefik.http.routers.receipts.rule=Host(`upload.samelmann.de`)"
      - "traefik.http.routers.receipts.entrypoints=websecure"
      - "traefik.http.routers.receipts.tls=true"
      - "traefik.http.routers.receipts.tls.certresolver=letsencrypt"

      # HTTP → HTTPS redirect router
      - "traefik.http.routers.receipts-http.rule=Host(`upload.samelmann.de`)"
      - "traefik.http.routers.receipts-http.entrypoints=web"
      - "traefik.http.routers.receipts-http.middlewares=receipts-redirect"
      - "traefik.http.middlewares.receipts-redirect.redirectscheme.scheme=https"

      - "traefik.http.services.receipts.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
