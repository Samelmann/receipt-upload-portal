services:
  app:
    build: .
    container_name: upload-page
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    networks:
      - proxy
    labels:
      # Cloudflare Tunnel terminates HTTPS at the edge and forwards plain HTTP
      # to Traefik, so we only need the `web` entrypoint — no TLS, no cert
      # resolver, no HTTP→HTTPS redirect (Cloudflare handles that).
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.receipts.rule=Host(`upload.samelmann.de`)"
      - "traefik.http.routers.receipts.entrypoints=web"
      - "traefik.http.services.receipts.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
